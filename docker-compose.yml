version: "3.8"

services:
  saas-marketplace:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas-marketplace-app
    restart: always
    environment:
      - NODE_ENV=production
      # Let the internal container port match the external host port to avoid any proxy/port mismatches
      - PORT=3030
      # You can specify other secrets here if needed, e.g.:
      # - ADMIN_PASSWORD=vision79admin
    ports:
      # PORT MAPPING: host_port:container_port
      # Adjust both sides if you want to use a different port, e.g., "80:80" or "3030:3030"
      - "3030:3030"
    volumes:
      # Mount the data directory rather than individual files to prevent Docker from creating dummy directories on the host
      - ./data:/app/data
